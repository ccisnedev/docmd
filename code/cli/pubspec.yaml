name: docmd_cli
description: >
  CLI runtime for DocMD — import, validate, and render Markdown-first document packages.
version: 0.2.0

environment:
  sdk: ^3.8.1

dependencies:
  # Pure-Dart engines keep import dependency-free. `archive` + `xml` read the
  # OOXML zip for pptx; `dart_pdf_reader` gives the PDF object model and stream
  # decoding for the native PDF text extractor. No Python.
  archive: ^4.0.0
  cli_router: ^0.1.0
  dart_pdf_reader: ^2.2.0
  modular_cli_sdk: ^0.3.3
  path: ^1.9.1
  xml: ^6.5.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
